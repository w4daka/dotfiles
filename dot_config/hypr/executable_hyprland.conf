# =============================================================
# Hyprland 設定ファイル (i3 移植版)
# 対象: Intel GPU / Arch Linux / デュアルモニター
# 元構成: i3 + picom + rofi + copyq + feh + betterlockscreen
# =============================================================

# -------------------------------------------------------------
# モニター設定 (xrandr --output DP-1 / HDMI-1 の移植)
# 要確認: `hyprctl monitors` で実際の名前を確認してから修正
# -------------------------------------------------------------
monitor = eDP-1,  1920x1080@60, 0x0,    1
monitor = HDMI-A-1,1920x1080@60, 1920x0, 1

# -------------------------------------------------------------
# 環境変数 (Intel GPU / Wayland 向け)
# -------------------------------------------------------------
env = GDK_BACKEND,         wayland,x11
env = QT_QPA_PLATFORM,     wayland;xcb
env = SDL_VIDEODRIVER,     wayland
env = CLUTTER_BACKEND,     wayland
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE,    wayland
env = XDG_SESSION_DESKTOP, Hyprland
env = HYPRCURSOR_THEME ,  miku-cursor-linux

# -------------------------------------------------------------
# 自動起動 (exec-once = 起動時1回だけ)
# -------------------------------------------------------------
exec-once = copyq                          # クリップボード (同上)
# 設計意図: デーモンを起動し、初期化が完了した直後に壁紙をセットする
# トレードオフ: 起動時に一瞬だけ黒い画面が見える可能性があるが、安定性は高い

exec-once = hyprpaper
exec-once = hypridle                       # アイドル管理 (i3: xss-lock)
exec-once = waybar                          # ステータスバー (i3: i3bar + i3status)
exec-once = mako                           # 通知デーモン (i3: notify-send)
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# PipeWire が動いていれば start-pulseaudio-x11 は不要
# 確認: pactl info | grep "Server Name"
# PipeWire と出れば以下は不要、PulseAudio なら要切り替え
# exec-once = start-pulseaudio-x11

# -------------------------------------------------------------
# 壁紙設定 (~/.config/hypr/hyprpaper.conf を別途作成)
# -------------------------------------------------------------
# → 下部の「hyprpaper.conf」セクション参照

# -------------------------------------------------------------
# キーボード・入力設定
# (setxkbmap / xset / xinput の移植)
# -------------------------------------------------------------
input {
    kb_layout  = jp
    kb_options = ctrl:nocaps    # Caps → Ctrl (i3: setxkbmap -option ctrl:nocaps)

    repeat_rate  = 50
    repeat_delay = 200

    follow_mouse = 1
    touchpad {
        natural_scroll       = false
        disable_while_typing = true
        tap-to-click         = true
    }
}
device {
    name = ven_04f3:00-04f3:32eb-touchpad
    enabled = false
}

# -------------------------------------------------------------
# 外観・レイアウト
# -------------------------------------------------------------
general {
    gaps_in  = 4
    gaps_out = 8
    border_size = 2

    col.active_border   = rgba(61afefff)   # アクティブ枠（青）
    col.inactive_border = rgba(282c34aa)   # 非アクティブ枠

    layout = master    # i3のデフォルトと近い分割挙動
}

decoration {
    rounding = 4
    blur {
        enabled = false    # 軽量化のため無効。有効化したければ true
    }
}

animations {
    enabled = true    # 最小構成のため無効。好みで有効化
}

dwindle {
    pseudotile      = true
    preserve_split  = true
}

# -------------------------------------------------------------
# $mod = Super (i3: set $mod Mod4)
# -------------------------------------------------------------
$mod = SUPER

# -------------------------------------------------------------
# キーバインド (i3 からの移植)
# -------------------------------------------------------------

# ターミナル (i3: bindsym $mod+Return exec wezterm)
bind = $mod, Return, exec, kitty

# アプリランチャー (i3: rofi -show drun)
$launcher = rofi -show drun
$windowSwitcher = rofi -show window
bind = $mod, D, exec, rofi -show drun

bind = $mod SHIFT, W, exec, rofi -show window

# ウィンドウを閉じる (i3: bindsym $mod+Shift+q kill)
bind = $mod SHIFT, Q, killactive

# フルスクリーン (i3: bindsym $mod+f fullscreen toggle)
bind = $mod, F, fullscreen

bind = $mod SHIFT, F, exec, thunar

# フローティング切り替え (i3: bindsym $mod+Shift+space floating toggle)
bind = $mod SHIFT, Space, togglefloating

# フォーカス移動 (i3: bindsym $mod+h/j/k/l focus)
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# ウィンドウ移動 (i3: bindsym $mod+Shift+j/k/l/semicolon move)
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# レイアウト切り替え (i3: split h/v)
bind = $mod, Semicolon, layoutmsg, togglesplit
bind = $mod, V,         layoutmsg, togglesplit

# ワークスペース移動 (i3: bindsym $mod+1..0 workspace)
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# ウィンドウをワークスペースへ移動 (i3: bindsym $mod+Shift+1..0)
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Hyprland リロード (i3: bindsym $mod+Shift+c reload)
bind = $mod SHIFT, C, exec, hyprctl reload

# Hyprland 終了 (i3: bindsym $mod+Shift+e)
bind = $mod SHIFT, E, exec, hyprctl dispatch exit

# ウィンドウリサイズ (i3: mode "resize")
bind  = $mod, R, submap, resize
submap = resize
    binde = , H, resizeactive, -30 0
    binde = , L, resizeactive,  30 0
    binde = , K, resizeactive,  0 -30
    binde = , J, resizeactive,  0  30
    bind  = , Return, submap, reset
    bind  = , Escape, submap, reset
submap = reset

# マウスでウィンドウ移動・リサイズ (i3: floating_modifier $mod)
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# -------------------------------------------------------------
# 音量 (i3: pactl set-sink-volume ... の移植)
# デバイス名は同じものをそのまま流用
# -------------------------------------------------------------
$sink_main = alsa_output.pci-0000_00_1f.3.analog-stereo
$sink_usb  = alsa_output.usb-JVCKENWOOD_JVCKENWOOD_USB_Audio-00.analog-stereo

binde = $mod ALT, Up,   exec, pactl set-sink-volume $sink_main +5%
binde = $mod ALT, Down, exec, pactl set-sink-volume $sink_main -5%
bind  = $mod ALT, M,    exec, pactl set-sink-mute   $sink_main toggle

# スピーカー / イヤホン 切り替え (i3: mod1+Shift+1/2)
bind = ALT SHIFT, 1, exec, pactl set-default-sink $sink_main
bind = ALT SHIFT, 2, exec, pactl set-default-sink $sink_usb

# -------------------------------------------------------------
# 画面の明るさ (i3: brightnessctl)
# -------------------------------------------------------------
binde = ALT SHIFT, 3, exec, brightnessctl set 5%-
binde = ALT SHIFT, 4, exec, brightnessctl set +5%

# -------------------------------------------------------------
# スクリーンショット (i3: spectacle → grim)
# -------------------------------------------------------------
 bind = ALT SHIFT, S, exec, grim - | wl-copy && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png | dunstify "Screenshot of whole screen taken" -t 1000 # screenshot of the whole screen

# -------------------------------------------------------------
# スクリーンロック (i3: betterlockscreen → hyprlock)
# -------------------------------------------------------------
bind = $mod SHIFT, X, exec, hyprlock

# -------------------------------------------------------------
# クリップボード (i3: copyq toggle)
# -------------------------------------------------------------
bind = ALT, V, exec, copyq toggle

# -------------------------------------------------------------
# ブラウザ (i3: Vivaldi)
# -------------------------------------------------------------
bind = ALT, W, exec, qutebrowser

# -------------------------------------------------------------
# Floaterm / IME スクラッチパッド (i3: $mod+i → ime.sh)
# ime.sh を Wayland 対応版に書き換えたものを呼ぶ
# → ~/.config/hypr/ime.sh を別途作成（下部参照）
# -------------------------------------------------------------
bind = $mod, I, exec, ~/.config/hypr/ime.sh

# Floaterm ウィンドウのルール (i3: for_window [class="Floaterm"])
# ~/.config/hypr/hyprland.conf
windowrule = match:class ^FloatingVim$, float on
windowrule = match:class ^FloatingVim$, size 70% 40%
# windowrule = match:class ^FloatingVim$, center on
# windowrule = match:class ^FloatingVim$, pin on
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# hyprwhspr - Toggle mode (added by hyprwhspr setup)
# Press once to start, press again to stop
bindd = SUPER ALT, D, Speech-to-text, exec, /usr/lib/hyprwhspr/config/hyprland/hyprwhspr-tray.sh record
