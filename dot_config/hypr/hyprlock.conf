# =============================================================
# hyprlock.conf
# 配置先: ~/.config/hypr/hyprlock.conf
# i3: betterlockscreen の移植
# =============================================================

background {
    monitor =
    path    = ~/.config/i3/wallpaper.png

    # ブラー（重い場合は blur_passes = 0 で無効化）
    blur_passes = 2
    blur_size   = 7
    brightness  = 0.6
}

input-field {
    monitor  =
    size     = 300, 50
    position = 0, -80
    halign   = center
    valign   = center

    outline_thickness = 2
    dots_size         = 0.33
    dots_spacing      = 0.15
    dots_center       = true

    outer_color  = rgb(61afef)   # 青（hyprland.confのborder colorと統一）
    inner_color  = rgb(1e2127)
    font_color   = rgb(abb2bf)

    placeholder_text = <i>Password</i>
    hide_input       = false
    check_color      = rgb(98c379)
    fail_color       = rgb(e06c75)
    fail_text        = <i>$FAIL <b>($ATTEMPTS)</b></i>
}

label {
    monitor  =
    text     = cmd[update:1000] echo "$(date +"%H:%M")"
    color    = rgb(abb2bf)
    font_size = 64
    position = 0, 160
    halign   = center
    valign   = center
}
