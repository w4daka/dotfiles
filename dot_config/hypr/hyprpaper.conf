# =============================================================
# hyprpaper.conf
# 配置先: ~/.config/hypr/hyprpaper.conf
# =============================================================
 
# 壁紙をプリロード（i3: feh --bg-scale の移植）
preload = ~/.config/i3/wallpaper.png
 
# 各モニターに壁紙を設定
# 要確認: `hyprctl monitors` で実際のモニター名を確認
wallpaper = ,~/.config/i3/wallpaper.png
 
# スプラッシュテキストを非表示
splash = false
 
