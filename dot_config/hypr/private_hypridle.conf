# =============================================================
# hypridle.conf
# 配置先: ~/.config/hypr/hypridle.conf
# i3: xss-lock -- betterlockscreen -l の移植
# =============================================================

general {
    lock_cmd        = hyprlock          # ロック実行コマンド
    before_sleep_cmd = hyprlock         # スリープ前にもロック
    after_sleep_cmd  = hyprctl dispatch dpms on  # スリープ復帰後に画面ON
}

# 5分無操作でロック
listener {
    timeout  = 300
    on-timeout = hyprlock
}

# 10分無操作でディスプレイOFF
listener {
    timeout    = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

