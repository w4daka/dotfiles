# ~/.config/kitty/kitty.conf

# ----------------------------------------
# Font
# ----------------------------------------
font_family      M+1Code Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        16.0

# ----------------------------------------
# Background / transparency
# ----------------------------------------
background_opacity 0.85

# 端末実行中に remote control 等で不透明度変更を許す
dynamic_background_opacity yes

# ----------------------------------------
# Scrollback
# ----------------------------------------
scrollback_lines 20000
scrollback_pager_history_size 128

# ----------------------------------------
# Clipboard
# ----------------------------------------
copy_on_select clipboard

# ----------------------------------------
# Scrollback -> Neovim overlay
# Ctrl+Shift+H で現在ウィンドウの screen + scrollback を
# overlay 上の nvim に stdin で流し込んで開く
# ----------------------------------------
map ctrl+shift+h launch --type=overlay --cwd=current --stdin-source=@screen_scrollback nvim --clean -n -R +'set clipboard=unnamedplus' +'setlocal buftype=nowrite bufhidden=wipe noswapfile nowrap nonumber norelativenumber' +'normal! G' -

# 任意: 標準の scrollback 検索
map ctrl+shift+/ search_scrollback
